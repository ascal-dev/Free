<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JioTV Stream Hub</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff0055; --bg: #0a0a0a; --card: #161616; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- HOME GRID UI --- */
        #gridView { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0 30px; flex-wrap: wrap; gap: 15px;
        }

        .logo { font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        #searchInput {
            flex: 1; max-width: 500px; padding: 14px 25px;
            border-radius: 50px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; font-size: 15px;
            outline: none; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,0,85,0.2); }

        #jiotvGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
        }

        .channel-card {
            background: var(--card); border-radius: 18px; overflow: hidden;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #222;
        }
        .channel-card:hover { transform: scale(1.05); border-color: var(--primary); }
        
        .img-box {
            width: 100%; aspect-ratio: 16/9; background: #000;
            display: flex; align-items: center; justify-content: center; padding: 15px;
        }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .name {
            padding: 15px; font-size: 14px; text-align: center; font-weight: 600;
            background: rgba(255,255,255,0.02);
        }

        /* --- PLAYER UI --- */
        #playerView { position: fixed; inset: 0; background: #000; z-index: 9999; }

        .player-controls-overlay {
            position: absolute; top: 0; left: 0; right: 0; padding: 25px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 10; display: flex; align-items: center; justify-content: space-between;
        }

        .btn-back {
            background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(10px); font-weight: 600; transition: 0.3s;
        }
        .btn-back:hover { background: var(--primary); border-color: var(--primary); }

        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #playerLogo { width: 130px; pointer-events: none; }

        #manualPlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--primary); color: white; padding: 18px 40px;
            border-radius: 50px; cursor: pointer; z-index: 11; 
            font-weight: 800; border: none; display: none;
            box-shadow: 0 10px 30px rgba(255,0,85,0.5);
        }
    </style>
</head>
<body>

    <div id="gridView">
        <div class="nav">
            <div class="logo">Jio<span style="color:#fff">TV</span> LIVE</div>
            <input type="text" id="searchInput" placeholder="Search sports, news, movies..." onkeyup="filterChannels()">
        </div>
        <div id="jiotvGrid">
            <p style="text-align:center; grid-column:1/-1; padding-top:50px; color:#666;">Parsing Playlist...</p>
        </div>
    </div>

    <div id="playerView" class="hidden">
        <div class="player-controls-overlay">
            <button class="btn-back" onclick="closePlayer()">✕ Exit Player</button>
            <img id="playerLogo" src="https://cricstream4u.github.io/cinearena/cineheader.png">
        </div>
        
        <div class="shaka-video-container" data-shaka-player-container>
            <video autoplay playsinline id="video" data-shaka-player></video>
            <div id="manualPlay">CLICK TO PLAY</div>
        </div>
    </div>

    <script>
        let allChannels = [];
        let player = null;
        let ui = null;

        // The specific channel data you provided
        const manualChannels = `
#EXTINF:-1 tvg-id="1984" group-title="Sports" tvg-logo="https://jiotv.catchup.cdn.jio.com/dare_images/images/Sports18_1_HD.png",Star Sports 2 Hindi HD
#KODIPROP:inputstream.adaptive.license_type=clearkey
#KODIPROP:inputstream.adaptive.license_key=bd1ea6a1c1fb5dcdb709434e0826bbc0:f57f22cba32739ce7beb1fab3f3d060b
#EXTVLCOPT:http-user-agent=plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0
#EXTHTTP:{"cookie":"__hdnea__=st=1769257764~exp=1769344164~acl=/*~hmac=1d99187f9a1cb62a5847f958f3c673b2d5bc65770b9513db7f4ed353270c5ad5"}
https://jiotvmblive.cdn.jio.com/bpk-tv/Sports18_1_HD_BTS/output/index.mpd?__hdnea__=st=1769257764~exp=1769344164~acl=/*~hmac=1d99187f9a1cb62a5847f958f3c673b2d5bc65770b9513db7f4ed353270c5ad5&xxx=%7Ccookie=__hdnea__=st=1769257764~exp=1769344164~acl=/*~hmac=1d99187f9a1cb62a5847f958f3c673b2d5bc65770b9513db7f4ed353270c5ad5

#EXTINF:-1 tvg-id="1985" group-title="Sports" tvg-logo="https://jiotv.catchup.cdn.jio.com/dare_images/images/Sports18_1_SD.png",Star Sports 2 Hindi
#KODIPROP:inputstream.adaptive.license_type=clearkey
#KODIPROP:inputstream.adaptive.license_key=a3ed8dc0e0cb5d238da80ee0a85bd2e1:67a96992e6406606f3480ab58d7f540c
#EXTVLCOPT:http-user-agent=plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0
#EXTHTTP:{"cookie":"__hdnea__=st=1769257764~exp=1769344164~acl=/*~hmac=1d99187f9a1cb62a5847f958f3c673b2d5bc65770b9513db7f4ed353270c5ad5"}
https://jiotvmblive.cdn.jio.com/bpk-tv/Sports18_1_SD_BTS/output/index.mpd?__hdnea__=st=1769257764~exp=1769344164~acl=/*~hmac=1d99187f9a1cb62a5847f958f3c673b2d5bc65770b9513db7f4ed353270c5ad5&xxx=%7Ccookie=__hdnea__=st=1769257764~exp=1769344164~acl=/*~hmac=1d99187f9a1cb62a5847f958f3c673b2d5bc65770b9513db7f4ed353270c5ad5
        `;

        async function init() {
            try {
                // Fetch external playlist
                const response = await fetch('https://raw.githubusercontent.com/alex8875/m3u/main/jtv.m3u');
                const externalText = await response.text();
                
                // Combine your two channels with the external list
                const fullText = manualChannels + "\n" + externalText;
                
                allChannels = parseM3U(fullText);
                render(allChannels);
            } catch (err) {
                // If fetch fails, still show the manual channels
                allChannels = parseM3U(manualChannels);
                render(allChannels);
            }
        }

        function parseM3U(data) {
            const list = [];
            const items = data.split('#EXTINF');
            
            items.forEach(item => {
                if (!item.includes('http')) return;
                
                const channel = {};
                // Name & Logo
                channel.name = item.split(',')[1]?.split('\n')[0].trim() || "Live TV";
                channel.logo = item.match(/tvg-logo="([^"]+)"/)?.[1] || "";
                
                // DRM Keys
                const keyMatch = item.match(/license_key=([^#\n\r]+)/);
                channel.keyStr = keyMatch ? keyMatch[1].trim() : "";
                
                // Cookies from #EXTHTTP
                const cookieMatch = item.match(/#EXTHTTP:({.*})/);
                try {
                    const cookieJson = cookieMatch ? JSON.parse(cookieMatch[1]) : null;
                    channel.cookie = cookieJson?.cookie || "";
                } catch(e) { channel.cookie = ""; }

                // User Agent from #EXTVLCOPT
                const uaMatch = item.match(/http-user-agent=([^\n\r]+)/);
                channel.userAgent = uaMatch ? uaMatch[1].trim() : "plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0";

                // URL
                const lines = item.split('\n');
                channel.url = lines.find(l => l.trim().startsWith('http')).trim();
                
                list.push(channel);
            });
            return list;
        }

        function render(items) {
            const grid = document.getElementById('jiotvGrid');
            grid.innerHTML = items.map((ch, i) => `
                <div class="channel-card" onclick="playChannel(${i})">
                    <div class="img-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/200x120/111/fff?text=No+Logo'"></div>
                    <div class="name">${ch.name}</div>
                </div>
            `).join('');
        }

        function filterChannels() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(q));
            renderFiltered(filtered);
        }

        function renderFiltered(items) {
            const grid = document.getElementById('jiotvGrid');
            grid.innerHTML = items.map((ch) => {
                const originalIndex = allChannels.indexOf(ch);
                return `
                <div class="channel-card" onclick="playChannel(${originalIndex})">
                    <div class="img-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/200x120/111/fff?text=No+Logo'"></div>
                    <div class="name">${ch.name}</div>
                </div>
            `}).join('');
        }

        async function playChannel(idx) {
            const ch = allChannels[idx];
            const video = document.getElementById('video');
            const playBtn = document.getElementById('manualPlay');
            
            document.getElementById('gridView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');

            shaka.polyfill.installAll();
            if (!player) {
                player = new shaka.Player(video);
                ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);
                ui.configure({ 'controlPanelElements': ['play_pause','time_and_duration','spacer','quality','fullscreen'] });
            }

            let drmConfig = { clearKeys: {} };
            if (ch.keyStr) {
                const parts = ch.keyStr.split('|')[0].split(':');
                if (parts.length >= 2) {
                    drmConfig.clearKeys[parts[0].trim()] = parts[1].trim();
                }
            }

            player.configure({
                drm: drmConfig,
                streaming: { lowLatencyMode: true, bufferingGoal: 12, rebufferingGoal: 2 }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = ch.userAgent;
                
                if (ch.cookie) {
                    request.headers['Cookie'] = ch.cookie;
                    if ((type === 2 || type === 3) && !request.uris[0].includes('__hdnea__=')) {
                        const sep = request.uris[0].includes('?') ? '&' : '?';
                        request.uris[0] += sep + ch.cookie;
                    }
                }
            });

            playBtn.onclick = () => { video.play(); playBtn.style.display='none'; };

            try {
                await player.load(ch.url);
                video.play().catch(() => playBtn.style.display = 'block');
            } catch (e) { playBtn.style.display = 'block'; }
        }

        function closePlayer() {
            const video = document.getElementById('video');
            video.pause();
            player.getNetworkingEngine().clearAllRequestFilters();
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('gridView').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
